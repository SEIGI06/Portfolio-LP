<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Contactez Lilian Peyr, étudiant en BTS SIO SISR. Discutez de vos projets.">
    <title>Contact — Lilian Peyr | BTS SIO SISR</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.seigi-tech.fr/contact">
    <meta property="og:title" content="Contact — Lilian Peyr | BTS SIO SISR">

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">

    <!-- Scripts -->
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
</head>

<body>
    <a href="#main-content" class="skip-link">Aller au contenu principal</a>

    <header class="site-header" id="main-header"></header>

    <main id="main-content">
        <section class="section" style="min-height: 80vh; display: flex; align-items: center;">
            <div class="container fade-in-up">
                <span class="badge">Me contacter</span>
                <h1 class="section__title">Discutons de votre <span class="text-gradient">projet</span></h1>
                <p style="text-align: center; margin-bottom: var(--space-lg); color: var(--color-text-muted);">
                    Remplissez le formulaire ci-dessous pour me contacter directement.
                </p>

                <div class="card card-glass"
                    style="max-width: 600px; margin: 0 auto; padding: var(--space-lg); border: 1px solid rgba(255, 255, 255, 0.1);">
                    <!-- Mettez à jour 'VOTRE_ID' avec votre identifiant Formspree -->
                    <form action="https://formspree.io/f/mnjgapzj" method="POST"
                        style="display: flex; flex-direction: column; gap: var(--space-md);">
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label for="name" style="font-weight: 500;">Votre Nom</label>
                            <input type="text" name="name" id="name" required placeholder="John Doe"
                                style="padding: 1rem; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-family: inherit;">
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label for="email" style="font-weight: 500;">Votre Email</label>
                            <input type="email" name="email" id="email" required placeholder="john@example.com"
                                style="padding: 1rem; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-family: inherit;">
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label for="message" style="font-weight: 500;">Votre Message</label>
                            <textarea name="message" id="message" required rows="5"
                                placeholder="Comment puis-je vous aider ?"
                                style="padding: 1rem; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; resize: vertical; font-family: inherit;"></textarea>
                        </div>

                        <button type="submit" class="button button--primary"
                            style="width: 100%; justify-content: center; margin-top: 1rem;">Envoyer le message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer" id="main-footer"></footer>
</body>

</html>
